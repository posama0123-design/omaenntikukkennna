        const wordList = rawData.split('\n').map(line => {
            const parts = line.split(',');
            return { k: parts[0], r: parts[1] };
        });

        const screen = document.getElementById('game-screen');
        const scoreElem = document.getElementById('score');
        const msgElem = document.getElementById('msg');
        
        let score = 0;
        let isStarted = false;
        let activePlates = [];
        let typingPlate = null; // 今打っているお皿
        let charIndex = 0;

        function createPlate() {
            if (!isStarted) return;
            
            const word = wordList[Math.floor(Math.random() * wordList.length)];
            const plate = document.createElement('div');
            plate.className = 'sushi-plate';
            plate.style.top = Math.random() * 350 + 'px';
            plate.innerHTML = `<span class="kanji">${word.k}</span><span class="roman">${word.r}</span>`;
            
            screen.appendChild(plate);
            
            const plateObj = {
                el: plate,
                word: word,
                pos: -500,
                speed: 2 + Math.random() * 3
            };
            activePlates.push(plateObj);
        }

        function gameLoop() {
            if (!isStarted) return;

            activePlates.forEach((p, index) => {
                p.pos += p.speed;
                p.el.style.right = p.pos + 'px';

                // 画面外（左端）に出たら消去
                if (p.pos > window.innerWidth + 500) {
                    if (typingPlate === p) {
                        typingPlate = null;
                        charIndex = 0;
                    }
                    p.el.remove();
                    activePlates.splice(index, 1);
                }
            });

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('keydown', (e) => {
            if (!isStarted && e.code === 'Enter') {
                isStarted = true;
                msgElem.style.display = 'none';
                setInterval(createPlate, 2000); // 2秒おきにお皿追加
                gameLoop();
                return;
            }

            if (!isStarted) return;

            const key = e.key.toLowerCase();

            // ターゲットを探す（まだ何も打っていない場合）
            if (!typingPlate) {
                typingPlate = activePlates.find(p => p.word.r[0] === key);
                if (typingPlate) charIndex = 0;
            }

            // タイピング判定
            if (typingPlate && key === typingPlate.word.r[charIndex]) {
                charIndex++;
                const romanSpan = typingPlate.el.querySelector('.roman');
                const typed = typingPlate.word.r.substring(0, charIndex);
                const untyped = typingPlate.word.r.substring(charIndex);
                romanSpan.innerHTML = `<span class="typed">${typed}</span>${untyped}`;

                // 打ち終わった
                if (charIndex >= typingPlate.word.r.length) {
                    score += typingPlate.word.r.length;
                    scoreElem.textContent = score;
                    typingPlate.el.style.background = "#2ecc71"; // 正解色
                    
                    const finishedPlate = typingPlate;
                    setTimeout(() => finishedPlate.el.remove(), 100);
                    activePlates = activePlates.filter(p => p !== finishedPlate);
                    
                    typingPlate = null;
                    charIndex = 0;
                }
            }
        });
    </script>
